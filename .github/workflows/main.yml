name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Node 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Create package.json
      - name: Create package.json
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

      # Install Capacitor
      - name: Install Dependencies
        run: |
          npm install @capacitor/core@6
          npm install @capacitor/cli@6
          npm install @capacitor/android@6

      # Create WWW
      - name: Create WWW Folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      # Remove old android
      - name: Remove Android Folder
        run: |
          rm -rf android

      # Init Capacitor
      - name: Initialize Capacitor
        run: |
          npx cap init "MyApp" "com.islam.myapp" --web-dir=www

      # Add Android
      - name: Add Android Platform
        run: |
          npx cap add android

      # Sync
      - name: Sync Capacitor
        run: |
          npx cap sync android

      # Fix Gradle
      - name: Fix Gradle
        run: |
          cd android

          chmod +x gradlew

          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip" > gradle/wrapper/gradle-wrapper.properties

      # Build APK
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
