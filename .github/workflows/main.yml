name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Web Dir
        run: |
          mkdir -p www
          cp index.html www/ || true

      - name: Install Dependencies
        run: npm install

      - name: Build Android APK via Capacitor Action
        uses: richardsand/run-dist-action@v1
        with:
          platform: android
          build-cmd: echo "No web build step needed"
          dist-dir: www
          
