name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # تحميل المشروع
      - name: Checkout Code
        uses: actions/checkout@v4

      # Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      # إنشاء package.json
      - name: Create package.json
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

      # تثبيت Capacitor
      - name: Install Capacitor
        run: |
          npm install @capacitor/core
          npm install @capacitor/cli
          npm install @capacitor/android

      # إنشاء www
      - name: Create WWW Folder
        run: |
          mkdir -p www
          cp index.html www/index.html || true

      # حذف android القديم بالكامل
      - name: Clean Old Android
        run: |
          rm -rf android

      # تهيئة Capacitor
      - name: Init Capacitor
        run: |
          npx cap init app com.islam.app --web-dir=www

      # إضافة Android
      - name: Add Android
        run: |
          npx cap add android

      # تثبيت Gradle ثابت
      - name: Fix Gradle Version
        run: |
          cd android
          chmod +x gradlew

          sed -i 's/gradle-.*-all.zip/gradle-8.4-all.zip/g' gradle/wrapper/gradle-wrapper.properties

      # Sync
      - name: Capacitor Sync
        run: |
          npx cap sync android

      # Build APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      # رفع APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
