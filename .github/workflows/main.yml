name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Web Dir
        run: |
          mkdir -p www
          cp index.html www/ || true

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Init Project
        run: |
          npx cap init "My Game" "com.islam.mygame" --web-dir=www || true

      - name: Add Android
        run: |
          npx cap add android || true

      - name: Force Gradle Update for Java 21
        run: |
          cd android
          chmod +x gradlew
          ./gradlew wrapper --gradle-version 8.7 --distribution-type minimal

      - name: Sync Capacitor
        run: |
          npx cap sync

      - name: Build APK via Gradle
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
          
